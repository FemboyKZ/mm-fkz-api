name: Build

on:
  push:
    branches: ["*"]
    tags: ["*"]
    paths-ignore:
      - "configs/**"
      - "README.md"
  pull_request:
    branches: ["*"]
    paths-ignore:
      - "configs/**"
      - "README.md"

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          apt-get update -y
          apt-get install -y python3 python3-pip
          git clone https://github.com/alliedmodders/ambuild.git
          pip3 install ./ambuild

      - name: Configure
        run: |
          mkdir -p build && cd build
          python3 ../configure.py \
            --sdks cs2 \
            --targets x86_64 \
            --mms_path ../metamod-source \
            --hl2sdk-manifests ../metamod-source/hl2sdk-manifests \
            --enable-optimize

      - name: Build
        working-directory: build
        run: ambuild

      - name: Stage package
        run: |
          mkdir -p staging/addons
          cp -r build/package/addons/* staging/addons/
          mkdir -p staging/cfg/fkz-api
          cp configs/*.cfg staging/cfg/fkz-api/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mm-fkz-api-linux
          path: staging

  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install AMBuild
        run: |
          git clone https://github.com/alliedmodders/ambuild.git
          pip install ./ambuild

      - name: Configure
        run: |
          mkdir -Force build | Out-Null; cd build
          python ../configure.py `
            --sdks cs2 `
            --targets x86_64 `
            --mms_path ../metamod-source `
            --hl2sdk-manifests ../metamod-source/hl2sdk-manifests `
            --enable-optimize

      - name: Build
        working-directory: build
        run: ambuild

      - name: Stage package
        run: |
          New-Item -ItemType Directory -Force -Path staging/addons | Out-Null
          Copy-Item -Recurse build/package/addons/* staging/addons/
          New-Item -ItemType Directory -Force -Path staging/cfg/fkz-api | Out-Null
          Copy-Item configs/*.cfg staging/cfg/fkz-api/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mm-fkz-api-windows
          path: staging

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: mm-fkz-api-linux
          path: mm-fkz-api-linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: mm-fkz-api-windows
          path: mm-fkz-api-windows

      - name: Create archives
        run: |
          cd mm-fkz-api-linux && zip -r ../mm-fkz-api-${{ github.ref_name }}-linux.zip . && cd ..
          cd mm-fkz-api-windows && zip -r ../mm-fkz-api-${{ github.ref_name }}-windows.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            mm-fkz-api-${{ github.ref_name }}-linux.zip
            mm-fkz-api-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
