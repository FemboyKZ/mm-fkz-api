// FKZ API Plugin (Metamod:Source) - Configuration
// Packaged to: <game>/cfg/fkz-api/core.cfg

// API base URL (HTTP or HTTPS), e.g. https://api.femboykz.com
// Just scheme://host[:port] - no trailing path. A trailing slash is trimmed.
api_url     "https://api.femboykz.com"

// API authentication key (sent as Authorization: Bearer header).
// Must match ADMIN_API_KEY in the API's .env.
// Required for status reporting and for any endpoints behind admin auth.
api_key     ""

// Server IP override (RECOMMENDED).
// The hostip ConVar often resolves to 0.0.0.0, which the API rejects.
// Set this to the server's public IP, matching the IP registered in the API.
server_ip   ""

// Server port override (optional, uses the hostport ConVar if unset/0).
server_port "0"

// Reporting interval in seconds (minimum 1, default 10).
interval    "10"

// Local database
// Requires the sql_mm plugin to be loaded. Leave db_driver empty to disable.

// Driver: "sqlite", "mysql", or empty to disable.
db_driver   ""

// sqlite: database file path relative to the game dir (dirs auto-created).
//         e.g. addons/fkz-api/data/prefs.sqlite3
// mysql:  schema (database) name.
db_database "addons/fkz-api/data/prefs.sqlite3"

// MySQL connection (ignored when db_driver is "sqlite").
db_host     ""
db_user     ""
db_pass     ""
db_port     "3306"
